<!DOCTYPE html>
<html>
    <head>

        <title>My super shop.</title>

    </head>
    <body>
            <div class="store"></div>

            <script src="https://unpkg.com/supersimpledev/react.js"></script>
            <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
            <script src="https://unpkg.com/supersimpledev/babel.js"></script>

            <script type="text/babel">

                function Header()
                {
                    return(
                        <div>
                            <h1>My Super Shop 🛍️</h1>
                            <p>Best prices guaranteed!</p> 
                        </div>
                    );
                }

                function Product({name,category,price}){
                    return(
                        <div>
                            <h1>{name}</h1>
                            <p>Category:{category}</p>
                            <p>Price:{price}</p>
                            <button onClick={()=>alert(name + ' Added to Cart! 🛒')}>
                                Add to Cart
                            </button>    
                        </div>

                    );
                }

                function Footer(){
                    return(
                        <div>
                            <p>2026 My Shop. All rights reserved.</p>
                        </div>
                    );
                }

                const productList = (
                     <div>
                        <Header />
                        <Product name="T-Shirt" category="Clothing" price="$80" />
                        <Product name="iPhone" category="Phone" price="$800" />
                        <Product name="Laptop" category="Electronics" price="$500" />
                        <Product name="Bag" category="Hand Bag" price="$10" />
                        <Product name="watch" category="Rolex" price="$600" />
                        <Product name="Shirt" category="Clothing" price="$50" />
                        <Footer />
                    </div>

                );
                
            const container = document.querySelector('.store');
            ReactDOM.createRoot(container).render(productList);
            </script>

    </body>
</html>
