<!DOCTYPE html>
<html>
    <head>
        <title>useState Practice</title>
    </head>
    <body>
        <div class="App"></div>
        <script src="https://unpkg.com/supersimpledev/react.js"></script>
        <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
        <script src="https://unpkg.com/supersimpledev/babel.js"></script>
         
        <script type="text/babel">

            function Counter(){
                
                const [battery, setBattery]= React.useState(100);
                return(
                        <div>
                        <p>Battery:{battery}</p>
                        <button onClick={()=> setBattery(battery<100? battery+10:100)}>Charge</button>
                        <button onClick={()=>setBattery(battery >0? battery-10:0)}>Use</button>
                        <button onClick={()=>setBattery(100)}>Reset</button>
                        <p>{battery >= 80? "Full": battery >= 50 ? "Good 🟡" : battery >= 20 ? "Low 🟠" : "Critical! 🔴"}</p>
                       
                        
                        </div>
                
                );
            }

        const container = document.querySelector('.App'); 
        ReactDOM.createRoot(container).render(<Counter />);






        </script>

    </body>
</html>
